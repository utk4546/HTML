
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Mock</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f4f7;
      font-family: Arial, sans-serif;
    }

    .screen {
      width: 90%;
      max-width: 900px;
      height: 500px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card {
      width: 280px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .profile {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin: -40px auto 10px;
      overflow: hidden;
      background: #eee;
    }

    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .card p {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .dots {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bbb;
    }

    .dot.active {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="cover" />
      <div class="profile">
        <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12" alt="profile" />
      </div>
      <h3>User Name</h3>
      <p>Short description here</p>
    </div>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
