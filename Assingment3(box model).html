<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyWebsite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            background: #000;
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        /* Cards Section */
        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: #fff;
            width: 250px;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Status Badge */
        .status {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 10px;
            color: #fff;
        }

        .online {
            background: green;
        }

        .offline {
            background: red;
        }

        /* Profile Circle */
        .avatar {
            width: 80px;
            height: 80px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 10px auto;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .role {
            font-size: 13px;
            color: gray;
            margin: 5px 0 15px;
        }

        .desc {
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
        }

        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Bottom card center */
        .center {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        /* Help button */
        .help {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: red;
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h3>MyWebsite</h3>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Top Cards -->
    <div class="container">
        <div class="card">
            <span class="status online">ONLINE</span>
            <div class="avatar">R</div>
            <div class="name">Rahul</div>
            <div class="role">Web Developer</div>
            <div class="desc">Builds modern websites using HTML & CSS.</div>
            <button class="btn">View Profile</button>
        </div>

        <div class="card">
            <span class="status offline">OFFLINE</span>
            <div class="avatar">N</div>
            <div class="name">Neha</div>
            <div class="role">UI Designer</div>
            <div class="desc">Designs clean and user-friendly interfaces.</div>
            <button class="btn">View Profile</button>
        </div>
    </div>

    <!-- Bottom Center Card -->
    <div class="center">
        <div class="card">
            <span class="status online">ONLINE</span>
            <div class="avatar">A</div>
            <div class="name">Aman</div>
            <div class="role">Backend Developer</div>
            <div class="desc">Works with server logic and databases.</div>
            <button class="btn">View Profile</button>
        </div>
    </div>

    <!-- Help Button -->
    <div class="help">Help</div>

</body>
</html>
